use_default_settings: true

search:
  formats:
    - html
    - json
    - csv

server:
  limiter: false
  image_proxy: false
  public_instance: false

engines:
  # --- ОТКЛЮЧАЕМ слабые/нерелевантные ---
  - name: duckduckgo images
    disabled: true
  - name: deviantart
    disabled: true
  - name: pexels
    disabled: false
  - name: unsplash
    disabled: true
  - name: wikicommons.images
    disabled: true    # иконки/схемы, не товарные фото
  - name: openverse
    disabled: true    # только открытые лицензии, мусор для товаров

  # --- ОСНОВНЫЕ: предметные фото товаров ---
  - name: google images
    disabled: false
    
  - name: bing images
    disabled: false
    
  - name: brave.images
    disabled: false
    
  # --- ТЕМАТИЧЕСКИЕ: референсы, эстетика, идеи ---
  - name: pinterest
    engine: pinterest
    categories: images
    disabled: false
    
  - name: flickr
    disabled: false     # lifestyle фото, хорошо для услуг
  
  # --- ДОПОЛНИТЕЛЬНЫЕ по потребности ---
  - name: qwant images
    disabled: false     # EU движок, хорош для европейских брендов
 
